<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Opener</title>

<style>
body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.box{
background:#1e293b;
padding:30px;
border-radius:20px;
width:320px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#00d4ff;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#38bdf8;
}
</style>
</head>

<body>

<div class="box">
<h1>🔗 Link Opener</h1>

<input type="text" id="linkInput" placeholder="Paste link here">

<button onclick="openLink()">Open Link</button>
</div>

<script>
function openLink(){
let link = document.getElementById("linkInput").value;

if(link.trim() === ""){
alert("Paste a link first");
return;
}

window.open(link, "_blank");
}
</script>

</body>
</html>
